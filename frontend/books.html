<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>T1 Bookstore — Books</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">T1 <span>/ Bookstore</span></div>
  <nav>
    <a href="books.html" class="active">Books</a>
    <a href="index.html">Employees</a>
    <a href="transactions.html">Transactions</a>
    <a href="admin.html">Admin Portal</a>
  </nav>
</header>

<main>
  <div class="page-header">
    <h1>Books</h1>
    <p>Inventory catalogue</p>
  </div>

  <div class="filter-panel">
    <h2>Filter</h2>
    <div class="filter-grid">
      <div class="filter-group">
        <label for="title">Title</label>
        <input type="text" id="title" placeholder="Search title…">
      </div>
      <div class="filter-group">
        <label for="author">Author</label>
        <input type="text" id="author" placeholder="Author name…">
      </div>
      <div class="filter-group">
        <label for="isbn">ISBN</label>
        <input type="text" id="isbn" placeholder="978-…">
      </div>
      <div class="filter-group">
        <label for="genre">Genre</label>
        <select id="genre">
          <option value= "default">Select a genre</option>
          <option value="">All Genres</option>
          <option>Fiction</option>
          <option>Non-Fiction</option>
          <option>Mystery</option>
          <option>Science Fiction</option>
          <option>Biography</option>
          <option>History</option>
          <option>Children</option>
          <!-- Add more later idk -->
        </select>
      </div>
      <div class="filter-group">
        <label>Price Range</label>
        <div class="price-range">
          <input type="number" id="price_min" placeholder="Min" step="0.01">
          <input type="number" id="price_max" placeholder="Max" step="0.01">
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn-search" onclick="filterBooks()">Search</button>
        <button class="btn-ghost" onclick="resetForm()">Reset</button>
      </div>
    </div>
  </div>


  <div class="table-wrap" id="book-table" style="display: none">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Genre</th>
          <th>ISBN</th>
          <th>Price</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody id="book-tbody"></tbody>
    </table>
  </div>
</main>

<footer>
  <span>DBS Bookstore Management System</span>
</footer>

<script src="script.js"></script>
</body>
</html>
