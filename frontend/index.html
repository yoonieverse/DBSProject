<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>T1 Bookstore — Employees</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">T1 <span>/ Bookstore </span></div>
  <nav>
    <a href="books.html">Books</a>
    <a href="index.html" class="active">Employees</a>
    <a href="transactions.html">Transactions</a>
  </nav>
</header>

<main>
  <div class="page-header">
    <h1>Employees</h1>
    <p>Staff directory</p>
  </div>

  <div class="filter-panel">
    <h2>Filter</h2>
    <div class="filter-grid">
      <div class="filter-group">
        <label for="emp-name">Name</label>
        <input type="text" id="emp-name" placeholder="Search name…">
      </div>
      <div class="filter-group">
        <label for="emp-dept">Department</label>
        <select id="emp-dept">
          <option value="">All Departments</option>
          <option>Management</option>
          <option>Sales</option>
          <option>Inventory</option>
          <option>Customer Service</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="emp-role">Role</label>
        <select id="emp-role">
          <option value="">All Roles</option>
          <option>Manager</option>
          <option>Associate</option>
          <option>Cashier</option>
          <option>Stock Clerk</option>
        </select>
      </div>
      <div class="filter-actions">
        <button class="btn-search" onclick="filterEmployees()">Search</button>
        <button class="btn-ghost" onclick="resetEmp()">Reset</button>
      </div>
    </div>
  </div>

  <div class="table-wrap" id="emp-table" style="display: none">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Role</th>
          <th>Department</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Since</th>
        </tr>
      </thead>
      <tbody id="emp-tbody"></tbody>
    </table>
  </div>
</main>

<footer>
  <span>DBS Bookstore Management System</span>
</footer>


<script src="script.js"></script>
</body>
</html>
